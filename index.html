<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model (3s Interval)</title>
    <!-- เพิ่ม Font เพื่อความสวยงาม -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4F46E5;
            --secondary-color: #f3f4f6;
            --text-color: #1f2937;
            --success-color: #10b981;
            --border-radius: 12px;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 30px;
            color: var(--primary-color);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            font-family: 'Prompt', sans-serif;
        }

        button:hover {
            background-color: #4338CA;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #9CA3AF;
            cursor: not-allowed;
        }

        #webcam-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: var(--border-radius);
            border: 4px solid var(--primary-color);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            background-color: #000;
            min-height: 200px;
        }

        canvas {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: calc(var(--border-radius) - 4px);
            display: block;
        }

        #label-container {
            margin-top: 30px;
            display: grid;
            gap: 15px;
        }

        .label-row {
            background-color: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e5e7eb;
        }

        .label-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .label-probability {
            font-weight: bold;
            color: var(--success-color);
        }

        #timer {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #ef4444;
            min-height: 1.5em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Teachable Machine Image Model</h1>
    <button type="button" id="start-btn" onclick="init()">Start Camera</button>
    <div id="webcam-container"></div>
    <div id="timer"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/CsEy59Ug_/";

    let model, webcam, labelContainer, maxPredictions;
    let timerInterval;
    let isRunning = false;

    async function init() {
        if (isRunning) return;
        
        const startBtn = document.getElementById("start-btn");
        startBtn.disabled = true;
        startBtn.innerText = "Loading...";

        try {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // 1. โหลดโมเดล AI
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // 2. ตั้งค่าเว็บแคม (ปรับขนาดเป็น 200x200 ตามมาตรฐานต้นฉบับเพื่อความเสถียร)
            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip); 
            await webcam.setup(); // ขอสิทธิ์เข้าถึงกล้อง
            await webcam.play();
            
            isRunning = true;
            startBtn.style.display = "none"; // ซ่อนปุ่มเมื่อกล้องติดแล้ว

            // 3. แสดงผลกล้องบนหน้าจอ
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            // 4. สร้างแถวแสดงผลคะแนน
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; 
            for (let i = 0; i < maxPredictions; i++) { 
                const labelRow = document.createElement("div");
                labelRow.className = "label-row";
                labelRow.innerHTML = `<span class="label-name">-</span><span class="label-probability">0.00%</span>`;
                labelContainer.appendChild(labelRow);
            }

            // 5. รัน Loop หลักเพื่อให้กล้องเคลื่อนไหวลื่นไหล
            window.requestAnimationFrame(loop);

            // 6. เริ่มระบบนับถอยหลังทำนายผลทุกๆ 3 วินาที
            startIntervalPrediction();

        } catch (error) {
            console.error(error);
            alert("ไม่สามารถเปิดกล้องได้ กรุณาตรวจสอบสิทธิ์การใช้งานกล้องในเบราว์เซอร์ของคุณ");
            startBtn.disabled = false;
            startBtn.innerText = "Start Camera";
        }
    }

    // ฟังก์ชันนี้จะรันตลอดเวลาเพื่ออัปเดตภาพจากกล้องให้เคลื่อนไหวลื่นไหล (Real-time)
    async function loop() {
        if (!isRunning) return;
        webcam.update(); 
        window.requestAnimationFrame(loop);
    }

    // ฟังก์ชันควบคุมการนับถอยหลัง 3 วินาที เพื่อสั่งให้ AI ทำนายผล
    function startIntervalPrediction() {
        let timeLeft = 3;
        const timerElement = document.getElementById("timer");
        
        // ทำนายรอบแรกทันทีที่เปิดกล้อง
        predict();
        timerElement.innerText = `Next prediction in: ${timeLeft}s`;

        timerInterval = setInterval(async () => {
            timeLeft--;
            if (timeLeft <= 0) {
                timerElement.innerText = "Predicting...";
                await predict(); // เรียก AI มาทายภาพ ณ วินาทีนั้น
                timeLeft = 3;    // รีเซ็ตเวลากลับไปที่ 3 วินาที
            }
            timerElement.innerText = `Next prediction in: ${timeLeft}s`;
        }, 1000);
    }

    // สั่งให้ AI ประมวลผลภาพจากเว็บแคม
    async function predict() {
        if (!model || !webcam) return;
        
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const classPrediction = prediction[i].className;
            const probabilityPercentage = (prediction[i].probability * 100).toFixed(2) + "%";
            
            const row = labelContainer.childNodes[i];
            row.querySelector(".label-name").innerText = classPrediction;
            row.querySelector(".label-probability").innerText = probabilityPercentage;
        }
    }
</script>
</body>
</html>
